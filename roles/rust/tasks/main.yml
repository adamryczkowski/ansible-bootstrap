---
# Rust Role - Rust toolchain installation
#
# Purpose:
#   Installs Rust via rustup and optionally installs cargo-binstall for faster
#   package installation. Installs specified Rust CLI tools (atuin, zoxide, etc.).
#   Replaces the legacy librust.sh script.
#
# Key Variables:
#   - rust_username: User to install Rust for (default: target_user or ansible_user)
#   - rust_install_binstall: Install cargo-binstall for faster installs (default: true)
#   - rust_packages: List of Rust packages to install (default: atuin, zoxide, eza, bat, fd-find, ripgrep)
#
# Dependencies:
#   - bashrc role (for .bashrc.d directory)
#
# Example Usage:
#   - role: rust
#     vars:
#       rust_packages:
#         - atuin
#         - zoxide
#         - starship

- name: Rust | Install system dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - pkgconf
      - libssl-dev
      - zlib1g-dev
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Rust | Install system dependencies (Arch)
  community.general.pacman:
    name:
      - pkgconf
      - openssl
      - zlib
    state: present
  become: true
  when: ansible_facts['os_family'] == "Archlinux"

- name: Rust | Check if rustup is installed
  ansible.builtin.stat:
    path: "/home/{{ rust_username }}/.cargo/bin/rustup"
  register: rust_rustup_installed

- name: Rust | Download rustup installer
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup-init.sh
    mode: "0755"
  when: not rust_rustup_installed.stat.exists

- name: Rust | Install Rust
  ansible.builtin.command: /tmp/rustup-init.sh -y --no-modify-path
  become: true
  become_user: "{{ rust_username }}"
  when: not rust_rustup_installed.stat.exists
  environment:
    HOME: "/home/{{ rust_username }}"
  changed_when: true

- name: Rust | Ensure stable toolchain is set as default
  ansible.builtin.command: /home/{{ rust_username }}/.cargo/bin/rustup default stable
  become: true
  become_user: "{{ rust_username }}"
  environment:
    HOME: "/home/{{ rust_username }}"
  register: rust_default_result
  changed_when: "'installed' in rust_default_result.stderr or 'downloading' in rust_default_result.stderr"
  failed_when: false

- name: Rust | Clean up rustup installer
  ansible.builtin.file:
    path: /tmp/rustup-init.sh
    state: absent
  when: not rust_rustup_installed.stat.exists

- name: Rust | Add cargo to PATH in bashrc.d
  ansible.builtin.copy:
    content: |
      # Rust/Cargo PATH
      export PATH="$HOME/.cargo/bin:$PATH"
    dest: "/home/{{ rust_username }}/.bashrc.d/05_cargo.sh"
    mode: "0644"
    owner: "{{ rust_username }}"
    group: "{{ rust_username }}"
  become: true

- name: Rust | Check if cargo-binstall is installed
  ansible.builtin.stat:
    path: "/home/{{ rust_username }}/.cargo/bin/cargo-binstall"
  register: rust_binstall_installed

- name: Rust | Download cargo-binstall installer
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh
    dest: /tmp/cargo-binstall-install.sh
    mode: "0755"
  when: rust_install_binstall | bool and not rust_binstall_installed.stat.exists

- name: Rust | Install cargo-binstall
  ansible.builtin.shell: /tmp/cargo-binstall-install.sh
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ rust_username }}"
  when: rust_install_binstall | bool and not rust_binstall_installed.stat.exists
  environment:
    HOME: "/home/{{ rust_username }}"
    CARGO_HOME: "/home/{{ rust_username }}/.cargo"
  changed_when: true

# `cargo install --list` produces a header line per crate of the form
# `<crate> v<version> (<source>):` followed by indented binary names. We use
# that to skip crates that are already present, which avoids a ~10-30s
# crates.io round-trip per crate per playbook run.
- name: Rust | List installed cargo packages
  ansible.builtin.command:
    cmd: /home/{{ rust_username }}/.cargo/bin/cargo install --list
  register: rust_installed_list
  become: true
  become_user: "{{ rust_username }}"
  environment:
    HOME: "/home/{{ rust_username }}"
  changed_when: false
  when: rust_packages | length > 0

- name: Rust | Compute set of installed crate names
  ansible.builtin.set_fact:
    rust_installed_crates: >-
      {{
        rust_installed_list.stdout_lines
        | default([])
        | select('match', '^[^ ].* v.*:$')
        | map('regex_replace', '^([^ ]+) v.*$', '\1')
        | list
      }}
  when: rust_packages | length > 0

- name: Rust | Install Rust packages via binstall (skip already installed)
  ansible.builtin.command: >
    /home/{{ rust_username }}/.cargo/bin/cargo binstall --no-confirm {{ item }}
  loop: "{{ rust_packages }}"
  become: true
  become_user: "{{ rust_username }}"
  register: rust_binstall_result
  changed_when: rust_binstall_result.rc == 0
  failed_when:
    - rust_binstall_result.rc != 0
    - "'already installed' not in rust_binstall_result.stderr"
  environment:
    HOME: "/home/{{ rust_username }}"
    PATH: "/home/{{ rust_username }}/.cargo/bin:{{ ansible_facts['env']['PATH'] }}"
  when:
    - rust_packages | length > 0
    - rust_install_binstall | bool
    - item not in rust_installed_crates

- name: Rust | Install Rust packages via cargo install (fallback, skip already installed)
  ansible.builtin.command: >
    /home/{{ rust_username }}/.cargo/bin/cargo install {{ item }}
  loop: "{{ rust_packages }}"
  become: true
  become_user: "{{ rust_username }}"
  register: rust_install_result
  changed_when: "'Installing' in rust_install_result.stderr"
  failed_when: false
  environment:
    HOME: "/home/{{ rust_username }}"
    PATH: "/home/{{ rust_username }}/.cargo/bin:{{ ansible_facts['env']['PATH'] }}"
  when:
    - rust_packages | length > 0
    - not rust_install_binstall | bool
    - item not in rust_installed_crates
