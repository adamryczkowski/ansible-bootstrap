---
# Common role - Base system configuration

- name: Common | Set hostname
  ansible.builtin.hostname:
    name: "{{ common_hostname }}"
  become: true
  when: common_hostname is defined and common_hostname | length > 0

- name: Common | Configure locale (Debian/Ubuntu)
  ansible.builtin.locale_gen:
    name: "{{ common_locale }}"
    state: present
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Common | Set default locale (Debian/Ubuntu)
  ansible.builtin.copy:
    content: |
      LANG={{ common_locale }}
      LC_ALL={{ common_locale }}
    dest: /etc/default/locale
    owner: root
    group: root
    mode: "0644"
  become: true
  when: ansible_facts['os_family'] == "Debian"

# Arch: glibc ships /etc/locale.gen with most lines commented; uncomment the
# requested locale and run locale-gen, then write /etc/locale.conf.
- name: Common | Uncomment locale in /etc/locale.gen (Arch)
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: '^[#\s]*({{ common_locale }}\s+UTF-8)\s*$'
    line: '\1'
    backrefs: true
    state: present
  become: true
  when: ansible_facts['os_family'] == "Archlinux"
  register: common_arch_locale_gen

- name: Common | Run locale-gen (Arch)
  ansible.builtin.command:
    cmd: locale-gen
  become: true
  when:
    - ansible_facts['os_family'] == "Archlinux"
    - common_arch_locale_gen.changed
  changed_when: true

- name: Common | Set system locale via /etc/locale.conf (Arch)
  ansible.builtin.copy:
    content: |
      LANG={{ common_locale }}
    dest: /etc/locale.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when: ansible_facts['os_family'] == "Archlinux"

- name: Common | Set timezone
  community.general.timezone:
    name: "{{ common_timezone }}"
  become: true

- name: Common | Configure sudoers for passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/90-ansible-users
    line: "{{ item }} ALL=(ALL) NOPASSWD: ALL"
    create: true
    mode: "0440"
    validate: "visudo -cf %s"
  loop: "{{ common_sudoers_nopasswd }}"
  become: true
  when: common_sudoers_nopasswd | length > 0

- name: Common | Ensure /etc/apt/keyrings directory exists (Debian/Ubuntu)
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Common | Configure sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop: "{{ common_sysctl_settings | dict2items }}"
  become: true
  when: common_sysctl_settings | length > 0

# VPN Reconnect Script
- name: Common | Install reconnect_vpn.sh script
  ansible.builtin.copy:
    src: reconnect_vpn.sh
    dest: /usr/local/bin/reconnect_vpn.sh
    owner: root
    group: root
    mode: "0755"
  become: true
  when: common_install_reconnect_vpn | default(false)

- name: Common | Configure sudoers for reconnect_vpn.sh (passwordless)
  ansible.builtin.copy:
    content: |
      # Allow all users to run reconnect_vpn.sh without password
      ALL ALL=(ALL) NOPASSWD: /usr/local/bin/reconnect_vpn.sh
    dest: /etc/sudoers.d/reconnect_vpn
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  become: true
  when: common_install_reconnect_vpn | default(false)
