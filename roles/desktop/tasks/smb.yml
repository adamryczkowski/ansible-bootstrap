---
# Desktop SMB shares tasks

- name: Desktop SMB | Install SMB client packages
  ansible.builtin.package:
    name:
      - cifs-utils
      - smbclient
    state: present
  become: true

- name: Desktop SMB | Create mount points
  ansible.builtin.file:
    path: "{{ item.mount_point }}"
    state: directory
    mode: "0755"
    owner: "{{ desktop_username }}"
    group: "{{ desktop_username }}"
  become: true
  loop: "{{ desktop_smb_shares }}"
  when: desktop_smb_shares | length > 0

- name: Desktop SMB | Ensure credentials file parent directory exists
  ansible.builtin.file:
    path: "{{ desktop_smb_credentials_path | dirname }}"
    state: directory
    mode: "0755"
  become: true
  when: desktop_smb_username is defined and desktop_smb_password is defined

- name: Desktop SMB | Create credentials file
  ansible.builtin.template:
    src: smb_credentials.j2
    dest: "{{ desktop_smb_credentials_path }}"
    mode: "{{ desktop_smb_credentials_mode }}"
    owner: "{{ desktop_smb_credentials_owner }}"
    group: "{{ desktop_smb_credentials_group }}"
  become: true
  when: desktop_smb_username is defined and desktop_smb_password is defined
  no_log: true

- name: Desktop SMB | Add SMB mounts to fstab
  ansible.posix.mount:
    path: "{{ item.mount_point }}"
    src: "//{{ item.server }}/{{ item.share }}"
    fstype: cifs
    opts: "{{ item.opts | default(desktop_smb_default_opts) }}"
    state: present
  become: true
  loop: "{{ desktop_smb_shares }}"
  when: desktop_smb_shares | length > 0
