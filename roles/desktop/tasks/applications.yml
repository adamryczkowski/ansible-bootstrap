---
# Desktop applications tasks

- name: Desktop Apps | Install common desktop applications
  ansible.builtin.package:
    name: "{{ desktop_applications }}"
    state: present
  become: true

- name: Desktop Apps | Install Flatpak (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - flatpak
      - gnome-software-plugin-flatpak
    state: present
  become: true
  when:
    - desktop_install_flatpak | bool
    - ansible_facts['os_family'] == "Debian"

- name: Desktop Apps | Install Flatpak (Arch)
  community.general.pacman:
    name: flatpak
    state: present
  become: true
  when:
    - desktop_install_flatpak | bool
    - ansible_facts['os_family'] == "Archlinux"

- name: Desktop Apps | Add Flathub repository
  community.general.flatpak_remote:
    name: flathub
    flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
    state: present
  become: true
  when: desktop_install_flatpak | bool

- name: Desktop Apps | Install Flatpak applications
  community.general.flatpak:
    name: "{{ item }}"
    state: present
  become: true
  loop: "{{ desktop_flatpak_apps }}"
  when: desktop_install_flatpak | bool and desktop_flatpak_apps | length > 0

# Snap is Debian/Ubuntu-only by default. On Arch snapd lives in AUR; we
# don't auto-install it here.
- name: Desktop Apps | Install Snap applications (Debian/Ubuntu only)
  community.general.snap:
    name: "{{ item.name }}"
    classic: "{{ item.classic | default(false) }}"
    state: present
  become: true
  loop: "{{ desktop_snap_apps }}"
  when:
    - desktop_snap_apps | length > 0
    - ansible_facts['os_family'] == "Debian"
