---
- name: Android Emulator | Reload user systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ android_emulator_username }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ android_emulator_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ android_emulator_uid }}/bus"
  listen: "Android Emulator | Reload user systemd"

- name: Android Emulator | Restart emulator service
  ansible.builtin.systemd:
    name: android-emulator
    scope: user
    state: restarted
  become: true
  become_user: "{{ android_emulator_username }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ android_emulator_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ android_emulator_uid }}/bus"
  listen: "Android Emulator | Restart emulator"
