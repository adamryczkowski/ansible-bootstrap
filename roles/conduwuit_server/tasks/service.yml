---
# Conduwuit Server Role — Systemd Service Tasks

- name: Conduwuit Service | Deploy systemd unit file from template
  ansible.builtin.template:
    src: conduwuit.service.j2
    dest: /etc/systemd/system/conduwuit.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: "Conduwuit | Reload systemd"

- name: Conduwuit Service | Enable and start conduwuit service
  ansible.builtin.systemd:
    name: conduwuit
    enabled: true
    state: started
    daemon_reload: false
  become: true
