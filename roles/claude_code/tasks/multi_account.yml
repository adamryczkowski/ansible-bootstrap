---
# Multi-account overlays via bubblewrap.
#
# Prepares the plumbing for running multiple Anthropic accounts under a
# single Linux user, sharing ~/.claude/ but overlaying per-account
# .claude.json and .credentials.json. The interactive OAuth login step
# remains the operator's responsibility.
#
# See docs/two-claudes.md for design rationale.

- name: Claude Code | Multi-account | Install bubblewrap (Debian/Ubuntu)
  ansible.builtin.apt:
    name: bubblewrap
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Claude Code | Multi-account | Install bubblewrap (Arch)
  community.general.pacman:
    name: bubblewrap
    state: present
  become: true
  when: ansible_facts['os_family'] == "Archlinux"

- name: Claude Code | Multi-account | Create per-account directories
  ansible.builtin.file:
    path: "{{ claude_code_user_home }}/.claude-{{ item }}"
    state: directory
    owner: "{{ claude_code_username }}"
    group: "{{ claude_code_username }}"
    mode: '0700'
  loop: "{{ claude_code_multi_account.accounts }}"
  become: true

- name: Claude Code | Multi-account | Create stub identity files
  ansible.builtin.copy:
    content: "{}"
    dest: "{{ claude_code_user_home }}/.claude-{{ item.0 }}/{{ item.1 }}"
    owner: "{{ claude_code_username }}"
    group: "{{ claude_code_username }}"
    mode: '0600'
    force: false
  loop: "{{ claude_code_multi_account.accounts | product(['.claude.json', '.credentials.json']) | list }}"
  become: true

- name: Claude Code | Multi-account | Ensure ~/.bashrc.d exists
  ansible.builtin.file:
    path: "{{ claude_code_user_home }}/.bashrc.d"
    state: directory
    owner: "{{ claude_code_username }}"
    group: "{{ claude_code_username }}"
    mode: '0755'
  become: true

- name: Claude Code | Multi-account | Deploy per-account aliases
  ansible.builtin.template:
    src: claude_accounts.sh.j2
    dest: "{{ claude_code_user_home }}/.bashrc.d/22_claude_accounts.sh"
    owner: "{{ claude_code_username }}"
    group: "{{ claude_code_username }}"
    mode: '0644'
  become: true

# MCP-server sync into per-account .claude.json is intentionally NOT done
# here. Doing it in the playbook races with any live `claude-<acct>`
# session: the CLI holds .claude.json in memory and periodically flushes
# it back, so a playbook write can be stomped seconds later. That race
# was the root cause of both "/mcp shows no servers after clean playbook
# run" and apparent auth-reset symptoms (the CLI's stale flush also
# discarded freshly-updated identity state).
#
# The sync now lives in _claude_sync_mcp inside 22_claude_accounts.sh.
# It runs at launch time, before bwrap binds the file, so no CLI is
# holding it. First launch merges the shared mcpServers into the stub
# "{}" file; subsequent launches update only when the shared set changes.

# Drift tripwire: the multi-account design assumes the bubblewrap wrapper is
# the *only* mechanism that overlays per-account identity files onto the
# shared ~/.claude/ paths. If a stray host-level bind mount exists (e.g.
# someone ran `mount --bind ~/.claude-adam/.credentials.json
# ~/.claude/.credentials.json` manually), then `claude-<acct>` for one account
# silently writes into another account's file, masking bugs and making
# /login-in-wrapper appear to work for one winning account while quietly
# failing for the others. Fail the play if we detect any such mount.
- name: Claude Code | Multi-account | Assert no stray host-level bind mounts on claude files
  ansible.builtin.shell:
    cmd: |
      set -eu
      found=""
      check() {
        local p="$1"
        if [ -e "$p" ] && findmnt --mountpoint "$p" >/dev/null 2>&1; then
          found="${found}  $p$(printf '\n')  $(findmnt --noheadings --output SOURCE,FSTYPE --target "$p")$(printf '\n')"
        fi
      }
      check '{{ claude_code_user_home }}/.claude.json'
      check '{{ claude_code_user_home }}/.claude/.credentials.json'
      {% for acct in claude_code_multi_account.accounts %}
      check '{{ claude_code_user_home }}/.claude-{{ acct }}/.claude.json'
      check '{{ claude_code_user_home }}/.claude-{{ acct }}/.credentials.json'
      {% endfor %}
      if [ -n "$found" ]; then
        echo "DRIFT: host-level bind mount(s) detected on claude identity files."
        echo "The multi-account design does not expect any such mounts — remove them"
        echo "with \`sudo umount <path>\` and re-run the playbook."
        echo
        printf '%s\n' "$found"
        exit 1
      fi
      echo "OK: no stray host-level bind mounts."
    executable: /bin/bash
  changed_when: false
  become: true
  become_user: "{{ claude_code_username }}"
