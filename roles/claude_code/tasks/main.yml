---
# Claude Code role - Install Claude Code CLI, configure MCP servers, and connect agents
#
# This role:
# 1. Installs system dependencies (node, python, uv, poetry, just)
# 2. Installs Claude Code CLI
# 3. Sets up MCP servers (shared installation directory with roo_code)
# 4. Connects agents, commands, skills from AI Prompts repository
# 5. Deploys settings.json with MCP and permission configuration

- name: Claude Code | Look up user home directory
  ansible.builtin.getent:
    database: passwd
    key: "{{ claude_code_username }}"

- name: Claude Code | Set user home directory
  ansible.builtin.set_fact:
    claude_code_user_home: "{{ ansible_facts.getent_passwd[claude_code_username][4] }}"

- name: Claude Code | Expand MCP base directory
  ansible.builtin.set_fact:
    claude_code_mcp_dir: "{{ claude_code_mcp_base_dir | replace('~', claude_code_user_home) }}"

- name: Claude Code | Install system dependencies
  ansible.builtin.include_tasks: dependencies.yml

- name: Claude Code | Install Claude Code CLI
  ansible.builtin.include_tasks: install.yml
  when: claude_code_install_cli

- name: Claude Code | Create MCP base directory
  ansible.builtin.file:
    path: "{{ claude_code_mcp_dir }}"
    state: directory
    owner: "{{ claude_code_username }}"
    mode: '0755'
  become: true
  become_user: "{{ claude_code_username }}"

- name: Claude Code | Setup MCP servers
  ansible.builtin.include_tasks: mcp_servers.yml

# ── New role: ai_config ───────────────────────────────────────────────────────
- name: Claude Code | Configure AI prompts and hierarchy config
  ansible.builtin.import_role:
    name: ai_config
  vars:
    ai_config_username: "{{ claude_code_username }}"
    ai_config_source_remote: "{{ claude_code_ai_prompts.source_remote }}"
    ai_config_github_remote: "{{ claude_code_ai_prompts.github_remote }}"
    ai_config_dest_dir: "{{ claude_code_ai_prompts.dest_dir }}"
    ai_config_register_for_sync: "{{ claude_code_ai_prompts.register_for_sync | default(true) }}"
    ai_config_run_sync: "{{ claude_code_ai_prompts.run_sync | default(true) }}"
    ai_config_gotify_token: "{{ claude_code_gotify_token | default('') }}"
  when: claude_code_ai_prompts.enabled | default(false)

# ── New role: claude_hierarchy ────────────────────────────────────────────────
- name: Claude Code | Install claude-hierarchy MCP server
  ansible.builtin.import_role:
    name: claude_hierarchy
  vars:
    claude_hierarchy_username: "{{ claude_code_username }}"
    claude_hierarchy_node_version: "{{ claude_code_node_version }}"
    claude_hierarchy_source_dir: "{{ claude_code_mcp_servers.claude_hierarchy.source_dir | default('~/tmp/claude-hierarchy') }}"
    claude_hierarchy_run_validate: false
  when: claude_code_mcp_servers.claude_hierarchy.enabled | default(true)

- name: Claude Code | Deploy settings
  ansible.builtin.include_tasks: settings.yml

- name: Claude Code | Register MCP servers with CLI
  ansible.builtin.include_tasks: register_mcp.yml

- name: Claude Code | Configure multi-account overlays
  ansible.builtin.include_tasks: multi_account.yml
  when: claude_code_multi_account.enabled | default(false)
