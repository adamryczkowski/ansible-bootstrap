---
# Deploy Claude Code settings with MCP server configuration
#
# settings.json is machine-specific (contains absolute paths to MCP binaries)
# so it is deployed as a regular file, not a symlink to AI_prompts.

- name: Claude Code | Get mise node path
  ansible.builtin.shell: |
    export PATH="{{ claude_code_user_home }}/.local/share/mise/shims:$PATH"
    dirname $(which node)
  become: true
  become_user: "{{ claude_code_username }}"
  register: claude_code_mise_node_bin
  changed_when: false

- name: Claude Code | Set node bin path
  ansible.builtin.set_fact:
    claude_code_node_bin: "{{ claude_code_mise_node_bin.stdout | trim }}"

- name: Claude Code | Check if settings.json is a symlink (legacy)
  ansible.builtin.stat:
    path: "{{ claude_code_user_home }}/.claude/settings.json"
  register: claude_code_settings_stat

- name: Claude Code | Remove legacy settings.json symlink
  ansible.builtin.file:
    path: "{{ claude_code_user_home }}/.claude/settings.json"
    state: absent
  become: true
  become_user: "{{ claude_code_username }}"
  when:
    - claude_code_settings_stat.stat.exists | default(false)
    - claude_code_settings_stat.stat.islnk | default(false)

- name: Claude Code | Deploy settings.json
  ansible.builtin.template:
    src: settings.json.j2
    dest: "{{ claude_code_user_home }}/.claude/settings.json"
    owner: "{{ claude_code_username }}"
    mode: '0644'
  become: true
  become_user: "{{ claude_code_username }}"
