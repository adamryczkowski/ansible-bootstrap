---
# Clone AI Prompts repository (if needed) and connect agents, commands, skills, settings

- name: Claude Code | Expand AI prompts destination directory
  ansible.builtin.set_fact:
    claude_code_ai_prompts_dest: "{{ claude_code_ai_prompts.dest_dir | replace('~', claude_code_user_home) }}"

- name: Claude Code | Check if AI prompts repository already exists
  ansible.builtin.stat:
    path: "{{ claude_code_ai_prompts_dest }}/.git"
  register: claude_code_ai_prompts_git_dir

- name: Claude Code | Clone AI prompts repository from remote
  ansible.builtin.git:
    repo: "{{ claude_code_ai_prompts.source_remote }}"
    dest: "{{ claude_code_ai_prompts_dest }}"
    accept_hostkey: true
  become: true
  become_user: "{{ claude_code_username }}"
  when: not claude_code_ai_prompts_git_dir.stat.exists
  register: claude_code_ai_prompts_clone_result

- name: Claude Code | Track if repository was just cloned
  ansible.builtin.set_fact:
    claude_code_ai_prompts_just_cloned: "{{ claude_code_ai_prompts_clone_result.changed | default(false) }}"

- name: Claude Code | Set git remote origin to GitHub
  ansible.builtin.shell: |
    cd "{{ claude_code_ai_prompts_dest }}"
    if git remote | grep -q '^origin$'; then
      git remote set-url origin "{{ claude_code_ai_prompts.github_remote }}"
    else
      git remote add origin "{{ claude_code_ai_prompts.github_remote }}"
    fi
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ claude_code_username }}"
  when: claude_code_ai_prompts.github_remote is defined
  register: claude_code_set_remote_result
  changed_when: claude_code_set_remote_result.rc == 0

- name: Claude Code | Get target hostname
  ansible.builtin.command: hostname
  register: claude_code_target_hostname
  changed_when: false

- name: Claude Code | Get target IP address
  ansible.builtin.set_fact:
    claude_code_target_ip: "{{ ansible_default_ipv4.address | default(ansible_host) }}"

- name: Claude Code | Build sync entry for this host
  ansible.builtin.set_fact:
    claude_code_sync_entry: "{{ claude_code_username }}@{{ claude_code_target_ip }}:{{ claude_code_ai_prompts_dest }}"

- name: Claude Code | Read current git-sync-hosts.txt
  ansible.builtin.slurp:
    src: "{{ claude_code_ai_prompts_dest }}/git-sync-hosts.txt"
  register: claude_code_sync_hosts_content
  become: true
  become_user: "{{ claude_code_username }}"
  failed_when: false

- name: Claude Code | Check if host is already registered
  ansible.builtin.set_fact:
    claude_code_host_already_registered: >-
      {{ (claude_code_sync_hosts_content.content | default('') | b64decode).find(claude_code_sync_entry | default('')) >= 0 }}
  when: claude_code_sync_hosts_content is not failed

- name: Claude Code | Add host to git-sync-hosts.txt
  ansible.builtin.lineinfile:
    path: "{{ claude_code_ai_prompts_dest }}/git-sync-hosts.txt"
    line: "\n# {{ claude_code_target_hostname.stdout }} (added by ansible)\n{{ claude_code_sync_entry }}"
    insertafter: EOF
  become: true
  become_user: "{{ claude_code_username }}"
  when:
    - claude_code_ai_prompts.register_for_sync | default(true)
    - claude_code_sync_hosts_content is not failed
    - not (claude_code_host_already_registered | default(false))
  register: claude_code_host_registered

- name: Claude Code | Commit the host registration
  ansible.builtin.shell: |
    cd "{{ claude_code_ai_prompts_dest }}"
    git add git-sync-hosts.txt
    git commit -m "Add {{ claude_code_target_hostname.stdout }} to sync hosts"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ claude_code_username }}"
  when: claude_code_host_registered.changed | default(false)
  register: claude_code_commit_result
  changed_when: claude_code_commit_result.rc == 0
  failed_when: false

# Only run sync on initial clone to avoid conflicts during non-interactive Ansible runs
- name: Claude Code | Run git-sync2.sh synchronization (initial clone only)
  ansible.builtin.shell: |
    cd "{{ claude_code_ai_prompts_dest }}"
    ./deploy/git-sync2.sh 2>&1
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ claude_code_username }}"
  when:
    - claude_code_ai_prompts.run_sync | default(true)
    - claude_code_ai_prompts_just_cloned
  register: claude_code_sync_result
  changed_when: "'Sync complete' in claude_code_sync_result.stdout or 'All hosts synchronized' in claude_code_sync_result.stdout"

- name: Claude Code | Verify synchronization completed
  ansible.builtin.assert:
    that:
      - claude_code_sync_result.stdout is search('Phase 5')
      - claude_code_sync_result.stdout is search('Synchronization Complete') or claude_code_sync_result.stdout is search('All hosts synchronized')
    fail_msg: "Synchronization did not complete successfully"
    success_msg: "Synchronization completed successfully"
  when:
    - claude_code_ai_prompts.run_sync | default(true)
    - claude_code_ai_prompts_just_cloned

- name: Claude Code | Verify AI prompts .claude directory exists
  ansible.builtin.stat:
    path: "{{ claude_code_ai_prompts_dest }}/.claude"
  register: claude_code_ai_prompts_dir

- name: Claude Code | Fail if AI prompts .claude directory is missing
  ansible.builtin.fail:
    msg: >
      AI Prompts repository was cloned to {{ claude_code_ai_prompts_dest }}
      but .claude directory not found. Check the repository contents.
  when: not claude_code_ai_prompts_dir.stat.exists

- name: Claude Code | Ensure ~/.claude directory exists
  ansible.builtin.file:
    path: "{{ claude_code_user_home }}/.claude"
    state: directory
    owner: "{{ claude_code_username }}"
    mode: '0700'
  become: true
  become_user: "{{ claude_code_username }}"

# Symlink agents directory
- name: Claude Code | Check if agents directory exists in AI prompts
  ansible.builtin.stat:
    path: "{{ claude_code_ai_prompts_dest }}/.claude/agents"
  register: claude_code_agents_src

- name: Claude Code | Check existing agents directory
  ansible.builtin.stat:
    path: "{{ claude_code_user_home }}/.claude/agents"
  register: claude_code_agents_existing
  when: claude_code_agents_src.stat.exists

- name: Claude Code | Remove existing agents directory if not a symlink
  ansible.builtin.file:
    path: "{{ claude_code_user_home }}/.claude/agents"
    state: absent
  become: true
  become_user: "{{ claude_code_username }}"
  when:
    - claude_code_agents_src.stat.exists
    - claude_code_agents_existing.stat.exists | default(false)
    - not (claude_code_agents_existing.stat.islnk | default(false))

- name: Claude Code | Create symlink for agents
  ansible.builtin.file:
    src: "{{ claude_code_ai_prompts_dest }}/.claude/agents"
    dest: "{{ claude_code_user_home }}/.claude/agents"
    state: link
    force: true
  become: true
  become_user: "{{ claude_code_username }}"
  when: claude_code_agents_src.stat.exists

