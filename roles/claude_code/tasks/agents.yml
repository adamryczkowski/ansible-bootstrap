- name: Claude Code | Display agents connection status
  ansible.builtin.debug:
    msg: |
      Claude Code agents connected:
      - agents: {{ claude_code_agents_src.stat.exists | default(false) }}
      - commands: {{ claude_code_commands_src.stat.exists | default(false) }}
      - skills: {{ claude_code_skills_src.stat.exists | default(false) }}
      - settings.json: {{ claude_code_settings_src.stat.exists | default(false) }}
      Source: {{ claude_code_ai_prompts_dest }}/.claude/
