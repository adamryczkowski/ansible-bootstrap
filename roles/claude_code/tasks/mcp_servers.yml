# ============================================================================
# mcp-pdb (via uv - runs on demand, no persistent installation)
# ============================================================================
- name: Claude Code | Verify mcp-pdb can be run via uv
  ansible.builtin.shell: |
    export PATH="{{ claude_code_user_home }}/.local/bin:{{ claude_code_user_home }}/.local/share/mise/shims:$PATH"
    uv run --python 3.13 --with mcp-pdb mcp-pdb --help
  become: true
  become_user: "{{ claude_code_username }}"
  when: claude_code_mcp_servers.mcp_pdb.enabled
  changed_when: false
  failed_when: false

