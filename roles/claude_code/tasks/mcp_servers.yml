# ============================================================================
# GitHub MCP (HTTP-based, uses GitHub Copilot API - no local installation)
# ============================================================================
- name: Claude Code | Note GitHub MCP configuration
  ansible.builtin.debug:
    msg: >
      GitHub MCP is HTTP-based and requires GITHUB_PERSONAL_ACCESS_TOKEN.
      Ensure the token is set in environment or settings.json before use.
  when: claude_code_mcp_servers.github.enabled
