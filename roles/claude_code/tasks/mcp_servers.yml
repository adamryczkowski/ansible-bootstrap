---
# Install and configure MCP servers for Claude Code

# ============================================================================
# SSH Server MCP (Node.js)
# ============================================================================
- name: Claude Code | Clone mcp-ssh-server
  ansible.builtin.git:
    repo: "{{ claude_code_mcp_servers.ssh_server.git_repo }}"
    dest: "{{ claude_code_mcp_dir }}/mcp-ssh-server"
    version: main
    depth: 1
  become: true
  become_user: "{{ claude_code_username }}"
  when: claude_code_mcp_servers.ssh_server.enabled

- name: Claude Code | Install mcp-ssh-server dependencies
  ansible.builtin.shell: |
    export PATH="{{ claude_code_user_home }}/.local/bin:{{ claude_code_user_home }}/.local/share/mise/shims:$PATH"
    cd {{ claude_code_mcp_dir }}/mcp-ssh-server
    npm install
    npm run build
  become: true
  become_user: "{{ claude_code_username }}"
  args:
    creates: "{{ claude_code_mcp_dir }}/mcp-ssh-server/node_modules"
  when: claude_code_mcp_servers.ssh_server.enabled

# ============================================================================
# Chrome DevTools MCP (npm global)
# ============================================================================
- name: Claude Code | Install chrome-devtools-mcp globally
  ansible.builtin.shell: |
    export PATH="{{ claude_code_user_home }}/.local/bin:{{ claude_code_user_home }}/.local/share/mise/shims:$PATH"
    npm install -g {{ claude_code_mcp_servers.chrome_devtools_mcp.package_name }}
  become: true
  become_user: "{{ claude_code_username }}"
  when: claude_code_mcp_servers.chrome_devtools_mcp.enabled
  register: claude_code_chrome_devtools_install
  changed_when: "'added' in claude_code_chrome_devtools_install.stdout | default('')"

# ============================================================================
# PDF Reader MCP (npm global)
# ============================================================================
- name: Claude Code | Install pdf-reader-mcp globally
  ansible.builtin.shell: |
    export PATH="{{ claude_code_user_home }}/.local/bin:{{ claude_code_user_home }}/.local/share/mise/shims:$PATH"
    npm install -g {{ claude_code_mcp_servers.pdf_reader_mcp.package_name }}
  become: true
  become_user: "{{ claude_code_username }}"
  when: claude_code_mcp_servers.pdf_reader_mcp.enabled
  register: claude_code_pdf_reader_install
  changed_when: "'added' in claude_code_pdf_reader_install.stdout | default('')"

# ============================================================================
# SVG MCP (Python/Poetry with systemd)
# ============================================================================
- name: Claude Code | Clone SVG-MCP
  ansible.builtin.git:
    repo: "{{ claude_code_mcp_servers.svg_mcp.git_repo }}"
    dest: "{{ claude_code_mcp_dir }}/SVG-MCP"
    version: main
    depth: 1
  become: true
  become_user: "{{ claude_code_username }}"
  when: claude_code_mcp_servers.svg_mcp.enabled

- name: Claude Code | Setup SVG-MCP
  ansible.builtin.shell: |
    export PATH="{{ claude_code_user_home }}/.local/bin:{{ claude_code_user_home }}/.local/share/mise/shims:$PATH"
    cd {{ claude_code_mcp_dir }}/SVG-MCP
    just setup
  become: true
  become_user: "{{ claude_code_username }}"
  args:
    creates: "{{ claude_code_mcp_dir }}/SVG-MCP/.venv"
  when: claude_code_mcp_servers.svg_mcp.enabled

- name: Claude Code | Install SVG-MCP systemd service
  ansible.builtin.shell: |
    export PATH="{{ claude_code_user_home }}/.local/bin:{{ claude_code_user_home }}/.local/share/mise/shims:$PATH"
    cd {{ claude_code_mcp_dir }}/SVG-MCP
    just install-systemd-service
  become: true
  become_user: "{{ claude_code_username }}"
  args:
    creates: "{{ claude_code_user_home }}/.config/systemd/user/svg-mcp.service"
  when: claude_code_mcp_servers.svg_mcp.enabled and (claude_code_mcp_servers.svg_mcp.systemd_service | default(false))

