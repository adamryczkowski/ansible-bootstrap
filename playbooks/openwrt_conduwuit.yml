---
# OpenWRT Conduwuit Deploy Playbook
#
# Deploys conduwuit Matrix homeserver on an aarch64 OpenWRT router using
# Docker (ghcr.io/continuwuity/continuwuity:v0.5.3), nginx-ssl for TLS
# termination, DDNS via Cloudflare, and Let's Encrypt certs (DNS-01).
#
# Usage:
#   ansible-playbook playbooks/openwrt_conduwuit.yml -i inventory/openwrt_conduwuit
#   ansible-playbook playbooks/openwrt_conduwuit.yml -i inventory/openwrt_conduwuit --tags openwrt_conduwuit_preflight
#   ansible-playbook playbooks/openwrt_conduwuit.yml -i inventory/openwrt_conduwuit --check
#
# Prerequisites:
#   - SSH access to OpenWRT router (openwrt_conduwuit group, typically root@192.168.10.10)
#   - Docker installed and running on the router
#   - openwrt_conduwuit_cloudflare_api_token and secrets set via Ansible Vault
#     (in inventory/openwrt_conduwuit/group_vars/openwrt_conduwuit.yml)

- name: Deploy conduwuit Matrix homeserver on OpenWRT router
  hosts: openwrt_conduwuit
  become: false
  gather_facts: false

  pre_tasks:
    - name: OpenWRT Conduwuit Bootstrap | Ensure Python3 is installed
      ansible.builtin.raw: >-
        if ! command -v python3 >/dev/null 2>&1; then
          opkg update && opkg install python3;
        fi
      register: openwrt_conduwuit_python_bootstrap
      changed_when: "'Installing python3' in openwrt_conduwuit_python_bootstrap.stdout"
      tags:
        - always

  roles:
    - role: openwrt_conduwuit
      tags:
        - openwrt_conduwuit
