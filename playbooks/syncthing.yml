---
# Syncthing playbook — install and configure Syncthing on a target host.
#
# Usage:
#   # ad-hoc against a specific host
#   ansible-playbook -i 192.168.10.7, playbooks/syncthing.yml -u adam
#
#   # from inventory, scoping to a named host/group
#   ansible-playbook -i inventory/production playbooks/syncthing.yml \
#       --limit wielodysk
#
# Defaults (see roles/syncthing/defaults/main.yml):
#   - Installs from stable-v2 channel on apt.syncthing.net
#   - Binds GUI to 127.0.0.1:8384 (access via SSH port-forward)
#   - Enables and starts syncthing@<target_user>.service
#
# Override the GUI bind to expose on LAN:
#   -e syncthing_gui_address=0.0.0.0:8384

- name: Install and configure Syncthing
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: apt_mirror
      tags: [apt_mirror, base]
      when: ansible_os_family == "Debian"

    - role: syncthing
      tags: [syncthing]
