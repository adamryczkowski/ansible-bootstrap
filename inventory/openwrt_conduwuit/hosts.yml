---
# OpenWRT Conduwuit Inventory
# Target: aarch64 OpenWRT router at 192.168.10.10

all:
  children:
    openwrt_conduwuit:
      hosts:
        openwrt-router:
          ansible_host: 192.168.10.10
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
