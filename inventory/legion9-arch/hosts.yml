---
# Inventory for Adam's new Lenovo Legion 9 (Arch Linux).
# Initial setup target: prepare-arch + Sway desktop equivalent of
# thinkpad-sway-setup.

all:
  hosts:
    legion9-arch:
      ansible_host: 192.168.11.183
      ansible_user: adam
      ansible_ssh_private_key_file: ~/.ssh/id_ed25519
      ansible_python_interpreter: /usr/bin/python3

  vars:
    # Target user for configuration (the user who will run Sway).
    target_user: adam
