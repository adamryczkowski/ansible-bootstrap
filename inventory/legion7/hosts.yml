---
all:
  hosts:
    legion7:
      # Run ansible against this host with `connection: local` — the
      # box invoking ansible-playbook IS legion7, so no SSH needed.
      # Override at the CLI (`-i 'legion7,'`) if you ever need to
      # target it remotely.
      ansible_connection: local
      ansible_user: "{{ lookup('env', 'USER') }}"
      # Pin to the system Python. Auto-detection picks up mise's
      # /home/adam/.local/share/mise/installs/python/3.12.13/bin/python
      # which is isolated from apt-installed python3-cffi /
      # python3-cryptography that ansible's `apt` module needs.
      ansible_python_interpreter: /usr/bin/python3
