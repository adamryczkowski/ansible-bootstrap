---
# Molecule test configuration for conduwuit Matrix homeserver role
#
# This scenario tests the full conduwuit deployment inside an LXD container,
# verifying that the binary, configuration, user, systemd service, and
# Matrix API are all correctly installed and functional.

dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: default

platforms:
  - name: conduwuit-test-noble
    groups:
      - conduwuit

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/roles
    ANSIBLE_COLLECTIONS_PATH: ${MOLECULE_PROJECT_DIRECTORY}/collections
  config_options:
    defaults:
      interpreter_python: auto_silent
      callbacks_enabled: profile_tasks
    connection:
      pipelining: true
  connection_options:
    ansible_connection: community.general.lxd
  inventory:
    host_vars:
      conduwuit-test-noble:
        ansible_user: root
        conduwuit_server_name: "test.example.com"
        conduwuit_setup_accounts: false
  playbooks:
    create: create.yml
    destroy: destroy.yml
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  name: conduwuit
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
